version: "3"

tasks:
  default:
    cmds:
      - task --list-all

  tests:
    aliases: ["t"]
    cmds:
      - go test ./... -count=1

  tests-race:
    aliases: ["tr"]
    cmds:
      - go test -race ./... -count=1

  build:
    aliases: ["b"]
    cmds:
      - mkdir -p bin
      - go build -o bin/orc ./cmd/orc

  fix:
    aliases: ["f"]
    cmds:
      - go fix ./...

  check:
    aliases: ["c"]
    cmds:
      - task fix
      - task format
      - task lint
      - task tests
      - task tests-race
      - task build

  goimports:
    cmds:
      - echo "Running goimports..."
      - find . -type f -name '*.go' -not -path "./vendor/*" -not -path "*gen/*" -exec goimports -w {} \;

  gofumpt:
    cmds:
      - echo "Running gofumpt..."
      - find . -type f -name '*.go' -not -path "./vendor/*" -not -path "*gen.go" -exec gofumpt -w {} \;

  format:
    aliases: ["fm"]
    deps: ["goimports", "gofumpt"]
    cmds:
      - echo "Formatting complete."

  lint:
    aliases: ["l"]
    cmds:
      - golangci-lint run --config .golangci.yml

  release-notes-preview:
    desc: Preview generated release notes for a first-parent git revision range.
    requires:
      vars: [RANGE]
    vars:
      REPOSITORY_URL: '{{default "" .REPOSITORY_URL}}'
    cmds:
      - go run ./cmd/release-notes --repository-url "{{.REPOSITORY_URL}}" "{{.RANGE}}"
