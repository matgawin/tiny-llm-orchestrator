id: codex
command:
  executable: codex
  normal_args: [--ask-for-approval, never]
  sandbox_args: [--dangerously-bypass-approvals-and-sandbox]
  args: [exec, --skip-git-repo-check, "-"]
prompt:
  delivery: stdin
model:
  supported: true
  required: false
  allowed: ["gpt-5.5", "gpt-5.4", "gpt-5.4-mini", "gpt-5.3-codex"]
  args: [--model, "{model}"]
reasoning:
  supported: true
  required: false
  default: medium
  allowed: [low, medium, high, xhigh]
  args: [--config, 'model_reasoning_effort="{reasoning}"']
directories:
  supported: true
  args: [--add-dir, "{dir}"]
sandbox:
  supported: true
  required: false
  requirements:
    env:
      pass: [OPENAI_API_KEY]
      set: {}
      set_from_mount:
        CODEX_HOME:
          mount: config_home
          value: target
    mounts:
      - id: config_home
        source:
          env: CODEX_HOME
          fallback:
            host_home: .codex
          create: true
        target:
          env_same_as_source: true
          fallback:
            sandbox_home: .codex
        mode: rw
