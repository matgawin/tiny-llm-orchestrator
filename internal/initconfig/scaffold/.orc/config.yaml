version: 1
defaults:
  loop_caps:
    enabled: true
    soft: 2
    hard: 4
workflows:
  implementation: workflows/implementation.yaml
  bugfix: workflows/bugfix.yaml
  mechanical-change: workflows/mechanical-change.yaml
  test-only: workflows/test-only.yaml
  review-mechanical: workflows/review-mechanical.yaml
  review-readability: workflows/review-readability.yaml
  review-redundancy: workflows/review-redundancy.yaml
  review-docs: workflows/review-docs.yaml
agents:
  planner: agents/planner.md
  coder: agents/coder.md
  mechanical-coder: agents/mechanical-coder.md
  bug-reproducer: agents/bug-reproducer.md
  tester: agents/tester.md
  test-designer: agents/test-designer.md
  reviewer: agents/reviewer.md
  mechanical-reviewer: agents/mechanical-reviewer.md
  readability-reviewer: agents/readability-reviewer.md
  redundancy-reviewer: agents/redundancy-reviewer.md
  docs-reviewer: agents/docs-reviewer.md

# Optional sandbox runner for Codex yolo mode.
# See docs/features/sandbox-run.md for the full policy. Existing configs are
# user-owned and are not auto-migrated.
# sandbox:
#   command:
#     argv:
#       - codex
#       - --dangerously-bypass-approvals-and-sandbox
#   require_for_workers: true
#   # HOME defaults to synthetic /home/orc. To preserve the host HOME path
#   # without binding the whole host home directory, set:
#   # home:
#   #   mode: host_path
#   # Then explicitly mount concrete home subpaths such as /home/user/.bun when
#   # a tool path like CODEX_BIN needs them; $HOME, ~, and command substitution
#   # are not expanded in config values.
#   # To make existing absolute PATH entries available as narrow read-only
#   # mounts without binding the whole host home, set:
#   # path:
#   #   mode: host_entries
#   bubblewrap:
#     network: true
