version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  default: none
  enable:
    # Essential linters for code quality (enabled by default)
    - errcheck        # Check for unchecked errors
    - govet           # Go vet built-in linter
    - ineffassign     # Detect ineffectual assignments
    - staticcheck     # Go static analysis
    - unused          # Check for unused constants, variables, functions and types

    # Additional useful linters (disabled by default)
    - goconst         # Finds repeated strings that could be replaced by a constant
    - misspell        # Finds commonly misspelled English words
    - unconvert       # Remove unnecessary type conversions
    - bodyclose       # Check whether HTTP response body is closed successfully
    - gosec           # Security-focused linter
    - gocritic        # Provides diagnostics that check for bugs, performance and style issues
    - errorlint       # Check error wrapping
    - nilerr          # Finds code that returns nil even if it checks that the error is not nil
    - wastedassign    # Finds wasted assignment statements
    - errchkjson      # Check JSON encoding/decoding errors
    - nilnil          # Finds nil value plus nil error returns
    - recvcheck       # Check for mixed receiver types
    - thelper         # Check test helpers call t.Helper
    - nolintlint      # Check nolint directives are precise and justified
    - dupword         # Finds duplicate words
    - musttag         # Enforce tags on JSON marshaled structs
    - dupl            # Detect duplicate code blocks
    - exhaustive      # Check enum-like switch statements cover all values
    - contextcheck    # Check function whether use a non-inherited context
    - noctx           # Check for contextless blocking calls
    - err113          # Enforce stable error values instead of dynamic construction
    - wrapcheck       # Require local context on returned boundary errors
    - gocognit        # Flag functions with high cognitive complexity
    - mnd             # Detect magic numbers
    - nestif          # Report deeply nested if statements
    - prealloc        # Suggest slice preallocation where beneficial
    - wsl_v5          # Enforce whitespace around statements

  settings:
    errcheck:
      check-type-assertions: true
    wrapcheck:
      extra-ignore-sigs:
        - tiny-llm-orchestrator/orc/internal/stableerr.New(
    gosec:
      excludes:
        - G104 # Audit errors not checked - covered by errcheck
    staticcheck:
        checks: ["all", "-ST1000", "-ST1003", "-ST1016", "-ST1020", "-ST1021", "-ST1022", "-SA1029"]
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - unnamedResult
        - hugeParam
        - rangeValCopy

  exclusions:
    paths:
      - mocks/
      - api/
    rules:
      - path: _test\.go
        linters:
          - gosec
      - path: test/
        linters:
          - gosec
